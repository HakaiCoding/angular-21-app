<section class="home-page" *transloco="let t">
  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title>{{ t('home.title') }}</mat-card-title>
      <mat-card-subtitle>{{ t('home.subtitle') }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>{{ t('home.description') }}</p>
    </mat-card-content>
  </mat-card>
</section>

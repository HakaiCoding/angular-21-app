<div *transloco="let t" class="shell">
  <header class="shell-header">
    <div class="shell-header-top">
      <p class="shell-brand">{{ t('shell.brand') }}</p>
      <app-language-switcher />
    </div>
    <nav [attr.aria-label]="t('shell.nav.primary')">
      <a routerLink="/home" routerLinkActive="active-link">
        {{ t('shell.nav.home') }}
      </a>
    </nav>
  </header>

  <main class="shell-content">
    <router-outlet />
  </main>
</div>

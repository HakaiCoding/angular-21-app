<nav *transloco="let t" class="nav-menu" [attr.aria-label]="t('shell.nav.primary')">
  @for (item of items; track item.id) {
    <a
      class="nav-link"
      matButton="text"
      [routerLink]="item.link"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="item.activeMatchOptions"
      ariaCurrentWhenActive="page"
    >
      {{ t(item.labelKey) }}
    </a>
  }
</nav>

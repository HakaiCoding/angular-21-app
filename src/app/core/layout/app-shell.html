<ng-container *transloco="let t">
  <mat-toolbar class="app-shell__toolbar">
    <a class="app-shell__brand" mat-button routerLink="/home">
      {{ t('shell.brand') }}
    </a>

    <nav aria-label="Primary navigation" class="app-shell__nav">
      <a
        mat-button
        routerLink="/home"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ t('shell.nav.home') }}
      </a>
    </nav>

    <span class="app-shell__spacer"></span>

    <div
      class="app-shell__lang-switcher"
      role="group"
      [attr.aria-label]="t('shell.languageSwitcherAriaLabel')"
    >
      @for (language of languages; track language) {
        <button
          mat-stroked-button
          type="button"
          [class.active-lang]="activeLang() === language"
          (click)="setLanguage(language)"
        >
          {{ language }}
        </button>
      }
    </div>
  </mat-toolbar>
</ng-container>

<main class="app-shell__content">
  <router-outlet />
</main>
